name: Refresh market data

on:
  push:
    branches: [main]
    paths-ignore:
      - "data/*.enc.json"
  schedule:
    - cron: "40 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-capital-market-data
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install cryptography

      - name: Refresh Capital.com ETF data
        env:
          CAPITAL_DEMO: "true"
          CAPITAL_API_KEY: ${{ secrets.CAPITAL_API_KEY }}
          CAPITAL_IDENTIFIER: ${{ secrets.CAPITAL_IDENTIFIER }}
          CAPITAL_PASSWORD: ${{ secrets.CAPITAL_PASSWORD }}
        run: python scripts/update_capital_etfs.py --output data/etfs.raw.json

      - name: Encrypt ETF data
        env:
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
        run: |
          python scripts/encrypt_data.py --input data/etfs.raw.json --output data/etfs.enc.json
          rm data/etfs.raw.json

      - name: Refresh Capital.com stock data
        env:
          CAPITAL_DEMO: "true"
          CAPITAL_API_KEY: ${{ secrets.CAPITAL_API_KEY }}
          CAPITAL_IDENTIFIER: ${{ secrets.CAPITAL_IDENTIFIER }}
          CAPITAL_PASSWORD: ${{ secrets.CAPITAL_PASSWORD }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        run: python scripts/update_capital_stocks.py --output data/stocks.raw.json --limit 250

      - name: Encrypt stock data
        env:
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
        run: |
          python scripts/encrypt_data.py --input data/stocks.raw.json --output data/stocks.enc.json
          rm data/stocks.raw.json

      - name: Commit refreshed data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data: refresh market data"
          file_pattern: data/*.enc.json
