name: Refresh ETF data

on:
  schedule:
    - cron: "40 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-capital-etf-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install cryptography

      - name: Refresh Capital.com ETF data
        env:
          CAPITAL_DEMO: "true"
          CAPITAL_API_KEY: ${{ secrets.CAPITAL_API_KEY }}
          CAPITAL_IDENTIFIER: ${{ secrets.CAPITAL_IDENTIFIER }}
          CAPITAL_PASSWORD: ${{ secrets.CAPITAL_PASSWORD }}
        run: python scripts/update_capital_etfs.py --output data/etfs.raw.json

      - name: Encrypt ETF data
        env:
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
        run: |
          python scripts/encrypt_data.py --input data/etfs.raw.json --output data/etfs.enc.json
          rm data/etfs.raw.json

      - name: Commit refreshed data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data: refresh ETF data"
          file_pattern: data/etfs.enc.json
