<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CAPETF</title>
  <style>
    :root {
      --good: #167a5a;
      --mid: #6d625a;
      --bad: #b14242;
      --muted: #667085;
      --line: #d0d5dd;
      --paper: #ffffff;
      --ink: #1d2939;
      --soft: #f7f7f4;
      --accent: #216e8a;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, Segoe UI, Arial, sans-serif; color: var(--ink); background: var(--soft); }
    main { padding: 18px; }
    h1 { margin: 0 0 4px; font-size: 24px; font-weight: 600; }
    .note, .code { color: var(--muted); font-size: 13px; }
    .auth {
      max-width: 420px;
      background: var(--paper);
      border: 1px solid #e4e7ec;
      border-radius: 8px;
      padding: 16px;
      margin: 16px 0;
    }
    .auth h2 { margin: 0 0 8px; font-size: 18px; font-weight: 600; }
    .auth-row { display: flex; gap: 8px; align-items: end; }
    label { display: flex; flex-direction: column; gap: 4px; font-size: 12px; color: var(--muted); }
    input, select {
      min-width: 170px;
      border: 1px solid #d0d5dd;
      border-radius: 6px;
      padding: 8px 9px;
      background: var(--paper);
      color: var(--ink);
    }
    button {
      border: 1px solid #d0d5dd;
      border-radius: 6px;
      padding: 8px 12px;
      background: var(--ink);
      color: var(--paper);
      cursor: pointer;
    }
    .tabs { display: flex; gap: 8px; margin: 14px 0 4px; }
    .tab {
      background: var(--paper);
      color: var(--ink);
    }
    .tab.active {
      background: var(--ink);
      color: var(--paper);
    }
    .locked .content { display: none; }
    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin: 14px 0;
    }
    .summary div, .card {
      background: var(--paper);
      border: 1px solid #e4e7ec;
      border-radius: 8px;
      padding: 10px;
      min-width: 0;
    }
    .summary strong { display: block; font-size: 22px; font-weight: 600; }
    .controls, .status { display: flex; flex-wrap: wrap; gap: 10px; align-items: end; margin: 10px 0; }
    .status { justify-content: space-between; }
    .status a { color: var(--accent); font-size: 13px; }
    .dashboard-layout { display: grid; grid-template-columns: minmax(0, 1fr) 330px; gap: 12px; align-items: start; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(248px, 1fr)); gap: 10px; }
    .sector-panel {
      background: var(--paper);
      border: 1px solid #e4e7ec;
      border-radius: 8px;
      padding: 10px;
      position: sticky;
      top: 10px;
    }
    .sector-head { display: flex; justify-content: space-between; gap: 8px; align-items: center; margin-bottom: 8px; }
    .sector-head strong { font-weight: 600; }
    .sector-list { display: grid; gap: 8px; }
    .sector-item {
      width: 100%;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 96px;
      gap: 8px;
      align-items: center;
      background: transparent;
      color: var(--ink);
      border: 1px solid #e4e7ec;
      text-align: left;
    }
    .sector-item.active { border-color: var(--ink); }
    .sector-name { display: block; font-size: 12px; font-weight: 600; overflow-wrap: anywhere; }
    .sector-meta { display: block; color: var(--muted); font-size: 11px; }
    .sector-spark { height: 42px; }
    .sector-spark .spark { stroke: var(--accent); }
    .open-sector { margin-top: 8px; width: 100%; background: var(--paper); color: var(--ink); }
    .head { display: grid; grid-template-columns: 1fr auto; gap: 8px; }
    .name { font-size: 13px; font-weight: 600; overflow-wrap: anywhere; }
    .badge { border: 1px solid currentColor; border-radius: 999px; padding: 2px 7px; font-size: 12px; white-space: nowrap; }
    .Best .badge { color: var(--good); }
    .Mediocre .badge { color: var(--mid); }
    .Worst .badge { color: var(--bad); }
    .Unvalidated .badge { color: var(--muted); }
    .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin: 8px 0; font-size: 12px; }
    .periods { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin: 8px 0; font-size: 11px; }
    .refs { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; margin: 8px 0; font-size: 12px; }
    .invest { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin: 8px 0; font-size: 12px; }
    .metrics span, .periods span, .refs span, .invest span { display: block; color: var(--muted); }
    .metrics strong, .periods strong, .refs strong, .invest strong { font-weight: 600; }
    svg { width: 100%; height: 96px; display: block; overflow: visible; }
    .axis { stroke: var(--line); stroke-width: 1; }
    .spark { fill: none; stroke-width: 2; }
    .Best .spark { stroke: var(--good); }
    .Mediocre .spark { stroke: var(--accent); }
    .Worst .spark { stroke: var(--bad); }
    .end-dot { fill: currentColor; }
    .chart-label { font-size: 11px; fill: var(--muted); }
    .no-chart { height: 96px; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 12px; border-top: 1px solid #eef0f3; border-bottom: 1px solid #eef0f3; }
    @media (max-width: 640px) {
      main { padding: 12px; }
      .summary { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      label, input, select { min-width: 0; width: 100%; }
      .auth-row { align-items: stretch; flex-direction: column; }
      .dashboard-layout { grid-template-columns: 1fr; }
      .sector-panel { position: static; }
    }
  </style>
</head>
<body class="locked">
  <main>
    <h1>CAPETF</h1>
    <div class="note">Capital.com ETF and stock dashboard</div>

    <section class="auth" id="auth-panel">
      <h2>Enter password</h2>
      <div class="auth-row">
        <label>Password <input id="password" type="password" autocomplete="current-password"></label>
        <button id="unlock" type="button">Unlock</button>
      </div>
      <div class="note" id="auth-note">Password is required to decrypt the data.</div>
    </section>

    <div class="content">
      <section class="tabs" aria-label="Dataset">
        <button class="tab" type="button" data-dataset="sectors">Sectors</button>
        <button class="tab active" type="button" data-dataset="etfs">ETFs</button>
        <button class="tab" type="button" data-dataset="stocks">Stocks</button>
      </section>

      <section class="summary">
        <div><strong id="instrument-count">...</strong><span class="note">instruments</span></div>
        <div><strong id="validated-count">...</strong><span class="note">validated charts</span></div>
        <div><strong id="source-date">...</strong><span class="note">source date</span></div>
        <div><strong id="source-name">Demo</strong><span class="note">source</span></div>
      </section>

      <section class="controls">
        <label>Search <input id="search" type="search" placeholder="Name, symbol, epic"></label>
        <label>Group
          <select id="band">
            <option value="all">All groups</option>
            <option>Best</option>
            <option>Mediocre</option>
            <option>Worst</option>
            <option>Unvalidated</option>
          </select>
        </label>
        <label>Sort
          <select id="sort">
            <option value="investmentRank">Investment rank, best to worst</option>
            <option value="performanceRank">Performance rank, best to worst</option>
            <option value="name">Name</option>
            <option value="return1w">1W return</option>
            <option value="return1m">1M return</option>
            <option value="return3m">3M return</option>
            <option value="return6m">6M return</option>
            <option value="return1y">1Y return</option>
          </select>
        </label>
        <label>Chart
          <select id="chart-mode">
            <option value="monthly">Monthly</option>
            <option value="weekly">Weekly</option>
            <option value="daily">Daily</option>
          </select>
        </label>
      </section>

      <div class="status">
        <div class="note" id="note">Waiting for password...</div>
        <a href="https://github.com/SAPJAE/CAPETF/actions/workflows/refresh.yml">Manual refresh</a>
      </div>
      <section class="dashboard-layout">
        <section class="grid" id="grid"></section>
        <aside class="sector-panel" id="sector-panel" hidden>
          <div class="sector-head"><strong>Sectors</strong><button type="button" class="tab active" id="sector-all">All</button></div>
          <div class="sector-list" id="sector-list"></div>
        </aside>
      </section>
    </div>
  </main>

  <script>
    const grid = document.getElementById('grid');
    const search = document.getElementById('search');
    const band = document.getElementById('band');
    const sort = document.getElementById('sort');
    const chartMode = document.getElementById('chart-mode');
    const note = document.getElementById('note');
    const sectorPanel = document.getElementById('sector-panel');
    const sectorList = document.getElementById('sector-list');
    const sectorAll = document.getElementById('sector-all');
    const password = document.getElementById('password');
    const authNote = document.getElementById('auth-note');
    const authPanel = document.getElementById('auth-panel');
    const tabButtons = [...document.querySelectorAll('.tab')];
    const datasetFiles = { etfs: 'data/etfs.enc.json', stocks: 'data/stocks.enc.json' };
    const datasetLabels = { sectors: 'sector', etfs: 'ETF', stocks: 'stock' };
    const datasets = {};
    let activeDataset = 'etfs';
    let activeSector = 'all';
    let dashboardPassword = '';
    let payload = null;

    const fmtPct = value => value == null ? 'n/a' : `${value >= 0 ? '+' : ''}${value.toFixed(1)}%`;
    const fmtPrice = value => value == null ? 'n/a' : Number(value).toFixed(2);
    const fmtScore = value => value == null ? 'n/a' : Number(value).toFixed(1);
    const fmtDistance = value => value == null ? 'n/a' : value < 0 ? `${Math.abs(value).toFixed(1)}% below` : `${value.toFixed(1)}% above`;
    const fmtTimestamp = value => {
      if (!value) return 'n/a';
      const parsed = new Date(value);
      return Number.isNaN(parsed.getTime()) ? value : parsed.toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' });
    };

    function escapeHtml(value) {
      return String(value || '').replace(/[&<>"']/g, char => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;', "'":'&#39;'}[char]));
    }

    function fromBase64Url(value) {
      const padded = value + '='.repeat((4 - value.length % 4) % 4);
      const binary = atob(padded.replace(/-/g, '+').replace(/_/g, '/'));
      const bytes = new Uint8Array(binary.length);
      for (let index = 0; index < binary.length; index += 1) bytes[index] = binary.charCodeAt(index);
      return bytes;
    }

    async function decrypt(encrypted, secret) {
      const material = await crypto.subtle.importKey('raw', new TextEncoder().encode(secret), 'PBKDF2', false, ['deriveKey']);
      const key = await crypto.subtle.deriveKey(
        { name: 'PBKDF2', hash: 'SHA-256', salt: fromBase64Url(encrypted.salt), iterations: encrypted.iterations },
        material,
        { name: 'AES-GCM', length: 256 },
        false,
        ['decrypt']
      );
      const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: fromBase64Url(encrypted.iv) }, key, fromBase64Url(encrypted.ciphertext));
      return JSON.parse(new TextDecoder().decode(plain));
    }

    function chartPoints(item) {
      if (chartMode.value === 'daily') {
        const points = item.dailyPoints || [];
        return points.slice(Math.floor(points.length * 0.75));
      }
      if (chartMode.value === 'weekly') {
        const points = item.weeklyPoints || item.monthlyPoints || [];
        return points.slice(Math.floor(points.length * 0.5));
      }
      return item.monthlyPoints || [];
    }

    function pathFor(points) {
      if (!points || points.length < 2) return '';
      const width = 218, height = 70, pad = 7;
      const values = points.map(point => point.v);
      let min = Math.min(...values), max = Math.max(...values);
      if (min === max) { min -= 1; max += 1; }
      return points.map((point, index) => {
        const x = pad + (index / (points.length - 1)) * (width - pad * 2);
        const y = pad + (1 - (point.v - min) / (max - min)) * (height - pad * 2);
        return `${index ? 'L' : 'M'}${x.toFixed(1)} ${y.toFixed(1)}`;
      }).join(' ');
    }

    function endPoint(points) {
      if (!points || points.length < 2) return null;
      const width = 218, height = 70, pad = 7;
      const values = points.map(point => point.v);
      let min = Math.min(...values), max = Math.max(...values);
      if (min === max) { min -= 1; max += 1; }
      const index = points.length - 1;
      const point = points[index];
      return { x: pad + (index / (points.length - 1)) * (width - pad * 2), y: pad + (1 - (point.v - min) / (max - min)) * (height - pad * 2) };
    }

    function fallbackSector(item) {
      const text = `${item.name || ''} ${item.symbol || ''}`.toLowerCase();
      if (/bank|bancorp|financial|capital|insurance|asset|managers|credit|loan|mortgage|exchange/.test(text)) return 'Financials';
      if (/bio|pharma|health|medical|therapeutics|genomics|surgery|well|care|diagnostics/.test(text)) return 'Healthcare';
      if (/software|semiconductor|systems|digital|cyber|tech|data|network|communications|apple|sap/.test(text)) return 'Technology';
      if (/energy|oil|gas|solar|power|electric|resources|mining|metals/.test(text)) return 'Energy & Materials';
      if (/air|auto|industrial|aerospace|logistics|shipping|rail|construction|test systems/.test(text)) return 'Industrials';
      if (/retail|consumer|restaurants|foods|beverage|apparel|travel|hotel|entertainment|media|networks/.test(text)) return 'Consumer';
      if (/realty|reit|property|properties/.test(text)) return 'Real Estate';
      return 'Other';
    }

    function sectorOf(item) {
      return item.sector || item.industry || fallbackSector(item);
    }

    function sectorPoints(items) {
      const series = items.map(item => chartPoints(item)).filter(points => points.length > 1);
      if (!series.length) return [];
      const minLength = Math.min(...series.map(points => points.length));
      const trimmed = series.map(points => points.slice(points.length - minLength));
      return trimmed[0].map((point, index) => ({
        d: point.d,
        v: Number((trimmed.reduce((sum, points) => sum + points[index].v, 0) / trimmed.length).toFixed(2)),
      }));
    }

    function sectorPointsFor(items, key) {
      const series = items.map(item => item[key] || []).filter(points => points.length > 1);
      if (!series.length) return [];
      const minLength = Math.min(...series.map(points => points.length));
      const trimmed = series.map(points => points.slice(points.length - minLength));
      return trimmed[0].map((point, index) => ({
        d: point.d,
        v: Number((trimmed.reduce((sum, points) => sum + points[index].v, 0) / trimmed.length).toFixed(2)),
      }));
    }

    function avg(items, key) {
      const values = items.map(item => item[key]).filter(Number.isFinite);
      return values.length ? Number((values.reduce((sum, value) => sum + value, 0) / values.length).toFixed(2)) : null;
    }

    function returnFromPoints(points, countBack) {
      if (!points.length) return null;
      const end = points[points.length - 1];
      const start = points[Math.max(0, points.length - countBack - 1)];
      return start && start.v ? Number(((end.v / start.v - 1) * 100).toFixed(2)) : null;
    }

    function previousYearLowFrom(points) {
      if (!points.length) return null;
      const endYear = Number(String(points[points.length - 1].d).slice(0, 4));
      const previous = points.filter(point => Number(String(point.d).slice(0, 4)) === endYear - 1);
      if (!previous.length) return null;
      return previous.reduce((low, point) => point.v < low.v ? point : low, previous[0]);
    }

    function oneYearAgoFrom(points) {
      if (!points.length) return null;
      const end = new Date(points[points.length - 1].d);
      const target = new Date(end);
      target.setFullYear(target.getFullYear() - 1);
      let found = null;
      points.forEach(point => {
        if (new Date(point.d) <= target) found = point;
      });
      return found;
    }

    function buildSectorPayload(stockPayload) {
      const stocks = stockPayload.items || [];
      const groups = {};
      stocks.forEach(item => {
        const sector = sectorOf(item);
        if (!groups[sector]) groups[sector] = [];
        groups[sector].push(item);
      });
      const items = Object.entries(groups).map(([sector, sectorItems]) => {
        const dailyPoints = sectorPointsFor(sectorItems, 'dailyPoints');
        const weeklyPoints = sectorPointsFor(sectorItems, 'weeklyPoints');
        const monthlyPoints = sectorPointsFor(sectorItems, 'monthlyPoints');
        const end = dailyPoints[dailyPoints.length - 1] || monthlyPoints[monthlyPoints.length - 1] || null;
        const start = dailyPoints[0] || monthlyPoints[0] || null;
        const low = previousYearLowFrom(dailyPoints);
        const old = oneYearAgoFrom(dailyPoints);
        return {
          epic: sector,
          name: `${sector} sector index`,
          symbol: `${sectorItems.length} stocks`,
          sectorName: sector,
          sectorMemberCount: sectorItems.length,
          instrumentType: 'SECTOR',
          status: 'Aggregated',
          validated: dailyPoints.length > 1 || monthlyPoints.length > 1,
          band: 'Unvalidated',
          performanceRank: null,
          investmentRank: null,
          price: end ? end.v : null,
          priceDate: end ? end.d : null,
          returnTotal: start && end && start.v ? Number(((end.v / start.v - 1) * 100).toFixed(2)) : null,
          return1w: returnFromPoints(dailyPoints, 7),
          return1m: returnFromPoints(dailyPoints, 30),
          return3m: returnFromPoints(dailyPoints, 91),
          return6m: returnFromPoints(dailyPoints, 182),
          return1y: returnFromPoints(dailyPoints, 365),
          oneYearAgoPrice: old ? old.v : null,
          oneYearAgoDate: old ? old.d : null,
          previousYearLowPrice: low ? low.v : null,
          previousYearLowDate: low ? low.d : null,
          distanceFromPreviousYearLowPct: low && end && low.v ? Number(((end.v / low.v - 1) * 100).toFixed(2)) : null,
          days: stockPayload.summary?.sourceAsOf || '',
          monthlyPoints,
          weeklyPoints,
          dailyPoints,
          ma200SlopePct: avg(sectorItems, 'ma200SlopePct'),
          trendScore: avg(sectorItems, 'trendScore'),
          dipScore: avg(sectorItems, 'dipScore'),
          recoveryScore: avg(sectorItems, 'recoveryScore'),
          investmentScore: avg(sectorItems, 'investmentScore'),
          investmentSignal: 'Sector blend',
        };
      });
      classifyClientSide(items);
      return {
        summary: {
          ...(stockPayload.summary || {}),
          instrumentCount: items.length,
          validatedChartCount: items.filter(item => item.validated).length,
          source: `${stockPayload.summary?.source || 'Capital.com demo API'} sectors`,
        },
        items,
      };
    }

    function classifyClientSide(items) {
      const ranked = items.filter(item => item.validated && Number.isFinite(item.returnTotal)).sort((a, b) => b.returnTotal - a.returnTotal);
      const quartile = ranked.length ? Math.ceil(ranked.length * 0.25) : 0;
      const bottomStart = ranked.length - quartile;
      ranked.forEach((item, index) => {
        item.performanceRank = index + 1;
        item.band = index < quartile ? 'Best' : index >= bottomStart ? 'Worst' : 'Mediocre';
      });
      [...items].sort(compareInvestment).forEach((item, index) => { item.investmentRank = index + 1; });
    }

    function renderSectorPanel(items) {
      if (activeDataset !== 'stocks') {
        activeSector = 'all';
        sectorPanel.hidden = true;
        return;
      }
      const groups = {};
      items.forEach(item => {
        const sector = sectorOf(item);
        if (!groups[sector]) groups[sector] = [];
        groups[sector].push(item);
      });
      const sectors = Object.entries(groups)
        .map(([name, sectorItems]) => ({ name, items: sectorItems, points: sectorPoints(sectorItems) }))
        .sort((a, b) => b.items.length - a.items.length || a.name.localeCompare(b.name));
      sectorPanel.hidden = false;
      sectorAll.classList.toggle('active', activeSector === 'all');
      sectorList.innerHTML = sectors.map(sector => `
        <button type="button" class="sector-item ${activeSector === sector.name ? 'active' : ''}" data-sector="${escapeHtml(sector.name)}">
          <span><span class="sector-name">${escapeHtml(sector.name)}</span><span class="sector-meta">${sector.items.length} stocks</span></span>
          <svg class="sector-spark" viewBox="0 0 96 42" aria-label="${escapeHtml(sector.name)} sector index">
            <path class="spark" d="${pathForSmall(sector.points)}"></path>
          </svg>
        </button>`).join('');
    }

    function pathForSmall(points) {
      if (!points || points.length < 2) return '';
      const width = 96, height = 42, pad = 4;
      const values = points.map(point => point.v);
      let min = Math.min(...values), max = Math.max(...values);
      if (min === max) { min -= 1; max += 1; }
      return points.map((point, index) => {
        const x = pad + (index / (points.length - 1)) * (width - pad * 2);
        const y = pad + (1 - (point.v - min) / (max - min)) * (height - pad * 2);
        return `${index ? 'L' : 'M'}${x.toFixed(1)} ${y.toFixed(1)}`;
      }).join(' ');
    }

    function card(item) {
      const cls = item.band || 'Unvalidated';
      const points = chartPoints(item);
      const ep = endPoint(points);
      const hasInvestmentScore = Number.isFinite(item.investmentScore);
      const hasTrendDetails = [item.trendScore, item.dipScore, item.recoveryScore].some(Number.isFinite);
      const hasLowDistance = Number.isFinite(item.distanceFromPreviousYearLowPct);
      const investmentRank = item.displayInvestmentRank || item.investmentRank || 'n/a';
      const investmentRankLabel = hasInvestmentScore ? 'Inv rank' : 'Low rank';
      const investmentBasis = hasInvestmentScore ? 'weighted score' : hasLowDistance ? 'low-price only' : 'not scored';
      const sectorOpen = activeDataset === 'sectors'
        ? `<button type="button" class="open-sector" data-sector-open="${escapeHtml(item.sectorName || item.name)}">Open ${escapeHtml(item.sectorName || item.name)}</button>`
        : '';
      const investmentPanel = hasInvestmentScore
        ? `<div class="invest"><div><span>Invest score</span><strong>${fmtScore(item.investmentScore)}</strong></div><div><span>Signal</span><strong>${escapeHtml(item.investmentSignal || 'Watch')}</strong></div><div><span>MA trend</span><strong>${fmtPct(item.ma200SlopePct)}</strong></div></div>`
        : '';
      const trendPanel = hasTrendDetails
        ? `<div class="code">Trend ${fmtScore(item.trendScore)} / dip ${fmtScore(item.dipScore)} / recovery ${fmtScore(item.recoveryScore)}</div>`
        : `<div class="code">Investment basis: ${investmentBasis}</div>`;
      const chart = item.validated && points.length > 1
        ? `<svg viewBox="0 0 218 96" role="img" aria-label="${escapeHtml(item.name)} chart">
             <line class="axis" x1="7" y1="70" x2="211" y2="70"></line>
             <path class="spark" d="${pathFor(points)}"></path>
             ${ep ? `<circle class="end-dot" cx="${ep.x.toFixed(1)}" cy="${ep.y.toFixed(1)}" r="3"></circle>` : ''}
             <text class="chart-label" x="7" y="90">${points[0]?.d || ''}</text>
             <text class="chart-label" x="211" y="90" text-anchor="end">${points[points.length - 1]?.d || ''}</text>
           </svg>`
        : '<div class="no-chart">No chart</div>';
      return `<article class="card ${cls}">
        <div class="head"><div><div class="name">${escapeHtml(item.name)}</div><div class="code">${escapeHtml(item.epic || item.symbol || '')}</div></div><span class="badge">${cls}</span></div>
        <div class="metrics"><div><span>Perf rank</span><strong>${item.performanceRank || 'n/a'}</strong></div><div><span>${investmentRankLabel}</span><strong>${investmentRank}</strong></div><div><span>Price</span><strong>${fmtPrice(item.price)}</strong></div></div>
        ${investmentPanel}
        <div class="periods"><div><span>1W</span><strong>${fmtPct(item.return1w)}</strong></div><div><span>1M</span><strong>${fmtPct(item.return1m)}</strong></div><div><span>3M</span><strong>${fmtPct(item.return3m)}</strong></div><div><span>6M</span><strong>${fmtPct(item.return6m)}</strong></div><div><span>1Y</span><strong>${fmtPct(item.return1y)}</strong></div></div>
        <div class="refs"><div><span>1Y ago ${item.oneYearAgoDate || ''}</span><strong>${fmtPrice(item.oneYearAgoPrice)}</strong></div><div><span>Prev-year low ${item.previousYearLowDate || ''}</span><strong>${fmtPrice(item.previousYearLowPrice)} · ${fmtDistance(item.distanceFromPreviousYearLowPct)}</strong></div></div>
        ${trendPanel}
        ${chart}
        ${sectorOpen}
        <div class="code">Performance ${item.performanceRank || 'n/a'} · Investment ${investmentRank} (${investmentBasis}) · ${chartMode.value} chart · ${item.priceDate || 'n/a'}</div>
      </article>`;
    }

    function investmentSortValue(item) {
      if (Number.isFinite(item.investmentScore)) return item.investmentScore;

      const distance = Number.isFinite(item.distanceFromPreviousYearLowPct) ? item.distanceFromPreviousYearLowPct : 999;
      const nearLowScore = Math.max(0, 100 - Math.abs(distance) * 3);
      const dipBonus = distance < 0 ? Math.max(0, 20 + distance) : 0;
      const recoveryScore =
        Math.max(0, Math.min(35, (item.return1m || 0) * 2.5)) +
        Math.max(0, Math.min(35, (item.return3m || 0) * 1.5)) +
        Math.max(0, Math.min(30, (item.return6m || 0)));
      const trendFactor =
        0.35 +
        ((item.return1m || 0) > 0 ? 0.12 : 0) +
        ((item.return3m || 0) > 0 ? 0.23 : 0) +
        ((item.return6m || 0) > 0 ? 0.30 : 0);
      if (Number.isFinite(item.distanceFromPreviousYearLowPct)) return (nearLowScore + dipBonus) * trendFactor + recoveryScore * 0.35;

      if (Number.isFinite(item.investmentRank)) return -item.investmentRank;
      return -999999;
    }

    function compareInvestment(a, b) {
      const diff = investmentSortValue(b) - investmentSortValue(a);
      return diff || a.name.localeCompare(b.name);
    }

    function prepareDisplayRanks() {
      const ranked = [...(payload.items || [])].sort(compareInvestment);
      ranked.forEach((item, index) => { item.displayInvestmentRank = index + 1; });
    }

    async function loadDataset(key) {
      if (datasets[key]) return datasets[key];
      if (key === 'sectors') {
        const stocks = await loadDataset('stocks');
        datasets[key] = buildSectorPayload(stocks);
        return datasets[key];
      }
      const response = await fetch(datasetFiles[key], { cache: 'no-store' });
      if (!response.ok) {
        throw new Error(`${datasetLabels[key]} data is not ready yet. Run the GitHub refresh once, or wait for the next daily refresh.`);
      }
      const loaded = await decrypt(await response.json(), dashboardPassword);
      datasets[key] = loaded;
      return loaded;
    }

    function updateSummary() {
      const summary = payload.summary || {};
      document.getElementById('instrument-count').textContent = summary.instrumentCount ?? 0;
      document.getElementById('validated-count').textContent = summary.validatedChartCount ?? 0;
      document.getElementById('source-date').textContent = summary.sourceAsOf || 'n/a';
      document.getElementById('source-name').textContent = summary.source || 'Demo';
    }

    async function selectDataset(key) {
      activeDataset = key;
      tabButtons.forEach(button => button.classList.toggle('active', button.dataset.dataset === key));
      grid.innerHTML = '';
      note.textContent = key === 'sectors' ? 'Loading sector indexes...' : key === 'stocks' ? 'Loading stocks...' : 'Loading ETFs...';
      try {
        payload = await loadDataset(key);
        activeSector = 'all';
        prepareDisplayRanks();
        updateSummary();
        render();
      } catch (error) {
        note.textContent = error.message || 'Data could not be loaded.';
        grid.innerHTML = '';
      }
    }

    function render() {
      if (!payload) return;
      const query = search.value.trim().toLowerCase();
      let items = (payload.items || []).filter(item => (
        (band.value === 'all' || item.band === band.value) &&
        (!query || `${item.name} ${item.symbol} ${item.epic}`.toLowerCase().includes(query))
      ));
      renderSectorPanel(items);
      if (activeDataset === 'stocks' && activeSector !== 'all') {
        items = items.filter(item => sectorOf(item) === activeSector);
      }
      items.sort((a, b) => {
        if (sort.value === 'name') return a.name.localeCompare(b.name);
        if (sort.value === 'investmentRank') return compareInvestment(a, b);
        if (sort.value.startsWith('return')) return (b[sort.value] ?? -999999) - (a[sort.value] ?? -999999);
        return (a.performanceRank ?? 999999) - (b.performanceRank ?? 999999);
      });
      const summary = payload.summary || {};
      note.textContent = `${items.length} shown. Refreshed ${fmtTimestamp(summary.refreshedAtUtc)}; source date ${summary.sourceAsOf || 'n/a'}.`;
      grid.innerHTML = items.map(card).join('');
    }

    async function unlock() {
      if (!password.value) {
        authNote.textContent = 'Enter the dashboard password.';
        return;
      }
      const unlockButton = document.getElementById('unlock');
      unlockButton.disabled = true;
      try {
        dashboardPassword = password.value;
        authNote.textContent = 'Downloading ETF data. First load can take up to a minute.';
        payload = await loadDataset('etfs');
        prepareDisplayRanks();
        updateSummary();
        document.body.classList.remove('locked');
        authNote.textContent = 'Unlocked.';
        authPanel.style.display = 'none';
        render();
      } catch {
        authNote.textContent = 'Password did not unlock the data.';
        unlockButton.disabled = false;
      }
    }

    document.getElementById('unlock').addEventListener('click', unlock);
    password.addEventListener('keydown', event => { if (event.key === 'Enter') unlock(); });
    search.addEventListener('input', render);
    band.addEventListener('change', render);
    sort.addEventListener('change', render);
    chartMode.addEventListener('change', render);
    tabButtons.forEach(button => button.addEventListener('click', () => selectDataset(button.dataset.dataset)));
    sectorAll.addEventListener('click', () => { activeSector = 'all'; render(); });
    sectorList.addEventListener('click', event => {
      const button = event.target.closest('.sector-item');
      if (!button) return;
      activeSector = button.dataset.sector;
      render();
    });
    grid.addEventListener('click', event => {
      const button = event.target.closest('.open-sector');
      if (!button) return;
      activeSector = button.dataset.sectorOpen;
      selectDataset('stocks').then(() => {
        activeSector = button.dataset.sectorOpen;
        render();
      });
    });
  </script>
</body>
</html>
