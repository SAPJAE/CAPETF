<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CAPETF</title>
  <style>
    :root {
      --good: #167a5a;
      --mid: #6d625a;
      --bad: #b14242;
      --muted: #667085;
      --line: #d0d5dd;
      --paper: #ffffff;
      --ink: #1d2939;
      --soft: #f7f7f4;
      --accent: #216e8a;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, Segoe UI, Arial, sans-serif; color: var(--ink); background: var(--soft); }
    main { padding: 18px; }
    h1 { margin: 0 0 4px; font-size: 24px; font-weight: 600; }
    .note, .code { color: var(--muted); font-size: 13px; }
    .sticky-panel {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(247, 247, 244, 0.96);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid #e4e7ec;
      padding: 4px 0 6px;
      margin-bottom: 10px;
    }
    .auth {
      max-width: 420px;
      background: var(--paper);
      border: 1px solid #e4e7ec;
      border-radius: 8px;
      padding: 16px;
      margin: 16px 0;
    }
    .auth h2 { margin: 0 0 8px; font-size: 18px; font-weight: 600; }
    .auth-row { display: flex; gap: 8px; align-items: end; }
    label { display: flex; flex-direction: column; gap: 4px; font-size: 12px; color: var(--muted); }
    input, select {
      min-width: 170px;
      border: 1px solid #d0d5dd;
      border-radius: 6px;
      padding: 8px 9px;
      background: var(--paper);
      color: var(--ink);
    }
    button {
      border: 1px solid #d0d5dd;
      border-radius: 6px;
      padding: 8px 12px;
      background: var(--ink);
      color: var(--paper);
      cursor: pointer;
    }
    .tabs { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; margin: 14px 0 4px; }
    .tab {
      background: var(--paper);
      color: var(--ink);
      width: 100%;
    }
    .tab.active {
      background: var(--ink);
      color: var(--paper);
    }
    .locked .content { display: none; }
    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin: 14px 0;
    }
    .summary div, .card {
      background: var(--paper);
      border: 1px solid #e4e7ec;
      border-radius: 8px;
      padding: 10px;
      min-width: 0;
    }
    .summary strong { display: block; font-size: 22px; font-weight: 600; }
    .controls, .status { display: flex; flex-wrap: wrap; gap: 10px; align-items: end; margin: 10px 0; }
    .status { justify-content: space-between; }
    .status a { color: var(--accent); font-size: 13px; }
    .refresh-tools { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
    .refresh-tools .disabled { color: var(--muted); pointer-events: none; text-decoration: none; }
    .refresh-state { color: var(--muted); font-size: 12px; }
    .dashboard-layout { display: block; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(248px, 1fr)); gap: 10px; }
    .sector-groups { display: grid; gap: 12px; grid-column: 1 / -1; }
    .sector-group {
      border: 1px solid #e4e7ec;
      border-radius: 8px;
      background: var(--paper);
      padding: 10px;
    }
    .sector-toggle {
      width: 100%;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      background: transparent;
      color: var(--ink);
      text-align: left;
      font-weight: 600;
    }
    .sector-toggle span { color: var(--muted); font-size: 12px; font-weight: 400; }
    .sector-group-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(248px, 1fr)); gap: 10px; margin-top: 10px; }
    .sector-group.collapsed .sector-group-grid { display: none; }
    .open-sector { margin-top: 8px; width: 100%; background: var(--paper); color: var(--ink); }
    .head { display: grid; grid-template-columns: 1fr auto; gap: 8px; }
    .name { font-size: 13px; font-weight: 600; overflow-wrap: anywhere; }
    .badge { border: 1px solid currentColor; border-radius: 999px; padding: 2px 7px; font-size: 12px; white-space: nowrap; }
    .Best .badge { color: var(--good); }
    .Mediocre .badge { color: var(--mid); }
    .Worst .badge { color: var(--bad); }
    .Unvalidated .badge { color: var(--muted); }
    .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin: 8px 0; font-size: 12px; }
    .periods { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin: 8px 0; font-size: 11px; }
    .refs { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; margin: 8px 0; font-size: 12px; }
    .invest { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin: 8px 0; font-size: 12px; }
    .metrics span, .periods span, .refs span, .invest span { display: block; color: var(--muted); }
    .metrics strong, .periods strong, .refs strong, .invest strong { font-weight: 600; }
    .quality-dip { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 6px; margin: 8px 0; font-size: 12px; }
    .quality-dip span { display: block; color: var(--muted); }
    .quality-dip strong { font-weight: 600; overflow-wrap: anywhere; }
    .quality-dip-context { margin: -2px 0 8px; }
    svg { width: 100%; height: 96px; display: block; overflow: visible; }
    .axis { stroke: var(--line); stroke-width: 1; }
    .spark { fill: none; stroke-width: 2; }
    .Best .spark { stroke: var(--good); }
    .Mediocre .spark { stroke: var(--accent); }
    .Worst .spark { stroke: var(--bad); }
    .end-dot { fill: currentColor; }
    .chart-label { font-size: 11px; fill: var(--muted); }
    .no-chart { height: 96px; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 12px; border-top: 1px solid #eef0f3; border-bottom: 1px solid #eef0f3; }
    .sticky-panel .tabs { margin: 4px 0 6px; }
    .sticky-panel .tab { padding: 6px 10px; }
    .sticky-panel .summary { gap: 6px; margin: 4px 0; }
    .sticky-panel .summary div { padding: 6px 8px; }
    .sticky-panel .summary strong { font-size: 16px; line-height: 1.1; }
    .sticky-panel .note { font-size: 11px; }
    .sticky-panel .controls, .sticky-panel .status { gap: 8px; margin: 4px 0; }
    .sticky-panel label { gap: 2px; }
    .sticky-panel input, .sticky-panel select { min-width: 140px; padding: 6px 8px; }
    @media (min-width: 960px) {
      .sticky-panel {
        display: grid;
        grid-template-columns: minmax(360px, 0.8fr) minmax(520px, 1.2fr);
        gap: 6px 12px;
        align-items: end;
      }
      .sticky-panel .tabs { grid-column: 1 / -1; }
      .sticky-panel .summary { margin: 0; }
      .sticky-panel .controls { margin: 0; justify-content: flex-start; }
      .sticky-panel .status { grid-column: 1 / -1; margin: 0; }
    }
    @media (max-width: 640px) {
      main { padding: 12px; }
      .sticky-panel { max-height: 58vh; overflow: auto; }
      .summary { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      label, input, select { min-width: 0; width: 100%; }
      .auth-row { align-items: stretch; flex-direction: column; }
    }
  </style>
</head>
<body class="locked">
  <main>
    <h1>CAPETF</h1>
    <div class="note">Capital.com ETF and stock dashboard</div>

    <section class="auth" id="auth-panel">
      <h2>Enter password</h2>
      <div class="auth-row">
        <label>Password <input id="password" type="password" autocomplete="current-password"></label>
        <button id="unlock" type="button">Unlock</button>
      </div>
      <div class="note" id="auth-note">Password is required to decrypt the data.</div>
    </section>

    <div class="content">
      <section class="sticky-panel">
        <section class="tabs" aria-label="Dataset">
          <button class="tab" type="button" data-dataset="sectors">Sectors</button>
          <button class="tab active" type="button" data-dataset="etfs">ETFs</button>
          <button class="tab" type="button" data-dataset="stocks">Stocks</button>
        </section>

        <section class="summary">
          <div><strong id="instrument-count">...</strong><span class="note">instruments</span></div>
          <div><strong id="validated-count">...</strong><span class="note">validated charts</span></div>
          <div><strong id="source-date">...</strong><span class="note">source date</span></div>
          <div><strong id="source-name">Demo</strong><span class="note">source</span></div>
        </section>

        <section class="controls">
          <label>Search <input id="search" type="search" placeholder="Name, symbol, epic"></label>
          <label>Group
            <select id="band">
              <option value="all">All groups</option>
              <option>Best</option>
              <option>Mediocre</option>
              <option>Worst</option>
              <option>Unvalidated</option>
            </select>
          </label>
          <label>Sort
            <select id="sort">
              <option value="investmentRank">Investment rank, best to worst</option>
              <option value="qualityDip" data-stock-only="true">Quality dip, best to worst</option>
              <option value="qualityDiscount" data-stock-only="true">Largest discount in quality trend</option>
              <option value="qualityStabilizing" data-stock-only="true">Stabilizing dips</option>
              <option value="opportunity">Opportunity score</option>
              <option value="closestLow">Closest to previous-year low</option>
              <option value="deepestDiscount">Best 1Y discount</option>
              <option value="dipUptrend">Dip inside uptrend</option>
              <option value="lowestPrice">Lowest buy price</option>
              <option value="best2h">Best 2H move</option>
              <option value="best4h">Best 4H move</option>
              <option value="best6h">Best 6H move</option>
              <option value="nearIntradayLow">Near intraday low</option>
              <option value="intradayRecovery">Recovered from intraday low</option>
              <option value="rebound1m">Best 1M rebound</option>
              <option value="maTrend">Best MA trend</option>
              <option value="performanceRank">Performance rank, best to worst</option>
              <option value="name">Name</option>
              <option value="return1w">1W return</option>
              <option value="return1m">1M return</option>
              <option value="return3m">3M return</option>
              <option value="return6m">6M return</option>
              <option value="return1y">1Y return</option>
            </select>
          </label>
          <label>Chart
            <select id="chart-mode">
              <option value="monthly">Monthly</option>
              <option value="weekly">Weekly</option>
              <option value="daily">Daily</option>
              <option value="2h">2H</option>
              <option value="4h">4H</option>
              <option value="6h">6H</option>
            </select>
          </label>
        </section>

        <div class="status">
          <div class="note" id="note">Waiting for password...</div>
          <div class="refresh-tools">
            <span class="refresh-state" id="refresh-state">Checking refresh...</span>
            <a id="manual-refresh" href="https://github.com/SAPJAE/CAPETF/actions/workflows/refresh.yml">Manual refresh</a>
          </div>
        </div>
      </section>
      <section class="dashboard-layout">
        <section class="grid" id="grid"></section>
      </section>
    </div>
  </main>

  <script>
    const grid = document.getElementById('grid');
    const search = document.getElementById('search');
    const band = document.getElementById('band');
    const sort = document.getElementById('sort');
    const chartMode = document.getElementById('chart-mode');
    const note = document.getElementById('note');
    const refreshState = document.getElementById('refresh-state');
    const manualRefresh = document.getElementById('manual-refresh');
    const password = document.getElementById('password');
    const authNote = document.getElementById('auth-note');
    const authPanel = document.getElementById('auth-panel');
    const tabButtons = [...document.querySelectorAll('.tab')];
    const datasetFiles = { etfs: 'data/etfs.enc.json', stocks: 'data/stocks.enc.json' };
    const stockManifestFile = 'data/stocks-manifest.enc.json';
    const stockBatchCount = 11;
    const stockBatchSize = 250;
    const stockBatchFiles = Array.from({ length: stockBatchCount }, (_, index) => `data/stocks-${String(index).padStart(3, '0')}.enc.json`);
    const datasetLabels = { sectors: 'sector', etfs: 'ETF', stocks: 'stock' };
    const datasets = {};
    const loadingDatasets = {};
    const stockPartsByFile = {};
    let activeDataset = 'etfs';
    const expandedGroupKeys = new Set();
    let dashboardPassword = '';
    let payload = null;
    let renderToken = 0;
    let refreshPollTimer = null;
    let stockBatchPollTimer = null;
    let refreshIsBusy = false;

    const fmtPct = value => value == null ? 'n/a' : `${value >= 0 ? '+' : ''}${value.toFixed(1)}%`;
    const fmtPrice = value => value == null ? 'n/a' : Number(value).toFixed(2);
    const fmtScore = value => value == null ? 'n/a' : Number(value).toFixed(1);
    const fmtDistance = value => value == null ? 'n/a' : value < 0 ? `${Math.abs(value).toFixed(1)}% below` : `${value.toFixed(1)}% above`;
    const fmtTimestamp = value => {
      if (!value) return 'n/a';
      const parsed = new Date(value);
      return Number.isNaN(parsed.getTime()) ? value : parsed.toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' });
    };

    function escapeHtml(value) {
      return String(value || '').replace(/[&<>"']/g, char => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;', "'":'&#39;'}[char]));
    }

    function escapeRegExp(value) {
      return String(value || '').replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function setRefreshBusy(isBusy, text) {
      refreshIsBusy = isBusy;
      refreshState.textContent = text;
      manualRefresh.classList.toggle('disabled', isBusy);
      manualRefresh.setAttribute('aria-disabled', isBusy ? 'true' : 'false');
      manualRefresh.title = isBusy ? 'A refresh is already running. Wait for GitHub Pages to publish the new files.' : 'Open GitHub Actions manual refresh page.';
      if (isBusy && !Object.keys(stockPartsByFile).length) {
        delete datasets.stocks;
        if (activeDataset === 'stocks') {
          payload = { summary: { instrumentCount: 0, validatedChartCount: 0, source: 'Waiting for stock batches', sourceAsOf: 'n/a' }, items: [] };
          updateSummary();
          grid.innerHTML = '';
          note.textContent = `${text}. Waiting for first stock batch to publish.`;
        }
      }
    }

    async function checkRefreshStatus() {
      try {
        const response = await fetch('https://api.github.com/repos/SAPJAE/CAPETF/actions/workflows/refresh.yml/runs?per_page=1', { cache: 'no-store' });
        if (!response.ok) throw new Error('status unavailable');
        const data = await response.json();
        const run = (data.workflow_runs || [])[0];
        if (!run) {
          setRefreshBusy(false, 'Refresh status unavailable');
          return;
        }
        if (run.status === 'queued' || run.status === 'in_progress' || run.status === 'waiting') {
          setRefreshBusy(true, `Refresh ${run.status.replace('_', ' ')}`);
          if (!refreshPollTimer) refreshPollTimer = setInterval(checkRefreshStatus, 60000);
          return;
        }
        setRefreshBusy(false, `Last refresh ${run.conclusion || run.status}`);
        if (refreshPollTimer) {
          clearInterval(refreshPollTimer);
          refreshPollTimer = null;
        }
      } catch {
        setRefreshBusy(false, 'Refresh status unavailable');
      }
    }

    function matchesSearch(item, query) {
      if (!query) return true;
      const name = String(item.name || '').toLowerCase();
      const symbol = String(item.symbol || '').toLowerCase();
      const epic = String(item.epic || '').toLowerCase();
      const group = `${stockGroupKey(item)} ${stockGroupLabel(item)}`.toLowerCase();
      if (query.length <= 3) {
        return symbol.startsWith(query) || epic.startsWith(query) || new RegExp(`\\b${escapeRegExp(query)}\\b`).test(name);
      }
      return `${name} ${symbol} ${epic} ${group}`.includes(query);
    }

    function fromBase64Url(value) {
      const padded = value + '='.repeat((4 - value.length % 4) % 4);
      const binary = atob(padded.replace(/-/g, '+').replace(/_/g, '/'));
      const bytes = new Uint8Array(binary.length);
      for (let index = 0; index < binary.length; index += 1) bytes[index] = binary.charCodeAt(index);
      return bytes;
    }

    async function decrypt(encrypted, secret) {
      const material = await crypto.subtle.importKey('raw', new TextEncoder().encode(secret), 'PBKDF2', false, ['deriveKey']);
      const key = await crypto.subtle.deriveKey(
        { name: 'PBKDF2', hash: 'SHA-256', salt: fromBase64Url(encrypted.salt), iterations: encrypted.iterations },
        material,
        { name: 'AES-GCM', length: 256 },
        false,
        ['decrypt']
      );
      const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: fromBase64Url(encrypted.iv) }, key, fromBase64Url(encrypted.ciphertext));
      return JSON.parse(new TextDecoder().decode(plain));
    }

    function isIntradayMode() {
      return ['2h', '4h', '6h'].includes(chartMode.value);
    }

    function pointValue(point) {
      return Number.isFinite(point?.p) ? point.p : point?.v;
    }

    function normalizeIntradayPoints(points, limit = 96) {
      const source = (points || []).filter(point => Number.isFinite(pointValue(point))).slice(-limit);
      if (source.length < 2) return [];
      const first = pointValue(source[0]);
      if (!first) return [];
      return source.map(point => ({
        d: String(point.d || point.date || '').replace('T', ' ').slice(5, 16),
        v: Number(((pointValue(point) / first) * 100).toFixed(2)),
        p: pointValue(point),
      }));
    }

    function aggregateIntradayPoints(points, hours) {
      const source = (points || []).filter(point => Number.isFinite(pointValue(point)));
      if (source.length < 2) return [];
      const buckets = [];
      for (let index = 0; index < source.length; index += hours) {
        const bucket = source.slice(index, index + hours);
        if (bucket.length) buckets.push(bucket[bucket.length - 1]);
      }
      return normalizeIntradayPoints(buckets, 96);
    }

    function intradayChartPoints(item, mode) {
      const hourly = item.hourlyPoints || item.hourPoints || [];
      if (mode === '4h') {
        const native = normalizeIntradayPoints(item.fourHourPoints || item.hour4Points || item.h4Points || []);
        return native.length ? native : aggregateIntradayPoints(hourly, 4);
      }
      if (mode === '2h') return aggregateIntradayPoints(hourly, 2);
      if (mode === '6h') return aggregateIntradayPoints(hourly, 6);
      return [];
    }

    function pointReturn(points) {
      if (!points || points.length < 2) return null;
      const start = pointValue(points[0]);
      const end = pointValue(points[points.length - 1]);
      return start ? Number(((end / start - 1) * 100).toFixed(2)) : null;
    }

    function intradayReturn(item, mode = chartMode.value) {
      return pointReturn(intradayChartPoints(item, mode));
    }

    function intradayLowDistance(item, mode = chartMode.value) {
      const points = intradayChartPoints(item, mode);
      if (points.length < 2) return null;
      const values = points.map(pointValue).filter(Number.isFinite);
      const end = values[values.length - 1];
      const low = Math.min(...values);
      return low ? Number(((end / low - 1) * 100).toFixed(2)) : null;
    }

    function chartPoints(item) {
      if (isIntradayMode()) return intradayChartPoints(item, chartMode.value);
      if (chartMode.value === 'daily') {
        const points = item.dailyPoints || [];
        return points.length > 260 ? points.slice(Math.floor(points.length * 0.75)) : points;
      }
      if (chartMode.value === 'weekly') {
        const points = item.weeklyPoints || item.monthlyPoints || [];
        return points.length > 156 ? points.slice(Math.floor(points.length * 0.5)) : points;
      }
      return item.monthlyPoints || [];
    }

    function pathFor(points) {
      if (!points || points.length < 2) return '';
      const width = 218, height = 70, pad = 7;
      const values = points.map(point => point.v);
      let min = Math.min(...values), max = Math.max(...values);
      if (min === max) { min -= 1; max += 1; }
      return points.map((point, index) => {
        const x = pad + (index / (points.length - 1)) * (width - pad * 2);
        const y = pad + (1 - (point.v - min) / (max - min)) * (height - pad * 2);
        return `${index ? 'L' : 'M'}${x.toFixed(1)} ${y.toFixed(1)}`;
      }).join(' ');
    }

    function endPoint(points) {
      if (!points || points.length < 2) return null;
      const width = 218, height = 70, pad = 7;
      const values = points.map(point => point.v);
      let min = Math.min(...values), max = Math.max(...values);
      if (min === max) { min -= 1; max += 1; }
      const index = points.length - 1;
      const point = points[index];
      return { x: pad + (index / (points.length - 1)) * (width - pad * 2), y: pad + (1 - (point.v - min) / (max - min)) * (height - pad * 2) };
    }

    function fallbackSector(item) {
      const text = `${item.name || ''} ${item.symbol || ''}`.toLowerCase();
      if (/bank|bancorp|financial|capital|insurance|asset|managers|credit|loan|mortgage|exchange/.test(text)) return 'Financials';
      if (/bio|pharma|health|medical|therapeutics|genomics|surgery|well|care|diagnostics/.test(text)) return 'Healthcare';
      if (/software|semiconductor|systems|digital|cyber|tech|data|network|communications|apple|\bsap\b/.test(text)) return 'Technology';
      if (/energy|oil|gas|solar|power|electric|resources|mining|metals/.test(text)) return 'Energy & Materials';
      if (/air|auto|industrial|aerospace|logistics|shipping|rail|construction|test systems/.test(text)) return 'Industrials';
      if (/retail|consumer|restaurants|foods|beverage|apparel|travel|hotel|entertainment|media|networks/.test(text)) return 'Consumer';
      if (/realty|reit|property|properties/.test(text)) return 'Real Estate';
      return 'Other';
    }

    function sectorOf(item) {
      return item.sector || item.industry || fallbackSector(item);
    }

    function regionOf(item) {
      const currency = String(item.currency || '').toUpperCase();
      const country = String(item.country || '').toLowerCase();
      if (item.region && item.region !== 'Other') return item.region;
      if (['united states', 'united states of america', 'usa', 'us'].includes(country)) return 'US';
      if (country === 'canada') return 'Canada';
      if (country === 'japan') return 'Japan';
      if (['EUR', 'GBP', 'CHF', 'SEK', 'NOK', 'DKK', 'PLN'].includes(currency)) return 'Europe';
      return item.region || 'Unmapped region';
    }

    function currencyOf(item) {
      return item.currency || 'Unknown currency';
    }

    function stockGroupKey(item) {
      return `${regionOf(item)}|${currencyOf(item)}|${sectorOf(item)}`;
    }

    function stockGroupLabel(item) {
      return `${regionOf(item)} / ${currencyOf(item)} / ${sectorOf(item)}`;
    }

    function stockFamilyKey(item) {
      return `stock|${regionOf(item)}|${currencyOf(item)}`;
    }

    function stockFamilyLabel(item) {
      return `${regionOf(item)} / ${currencyOf(item)}`;
    }

    function sectorFamilyKey(item) {
      return `${item.regionName || regionOf(item)}|${item.currencyName || currencyOf(item)}`;
    }

    function sectorFamilyLabel(item) {
      return `${item.regionName || regionOf(item)} / ${item.currencyName || currencyOf(item)}`;
    }

    function sectorPoints(items) {
      const series = items.map(item => chartPoints(item)).filter(points => points.length > 1);
      if (!series.length) return [];
      const minLength = Math.min(...series.map(points => points.length));
      const trimmed = series.map(points => points.slice(points.length - minLength));
      return trimmed[0].map((point, index) => ({
        d: point.d,
        v: Number((trimmed.reduce((sum, points) => sum + points[index].v, 0) / trimmed.length).toFixed(2)),
      }));
    }

    function sectorPointsFor(items, key) {
      const series = items.map(item => item[key] || []).filter(points => points.length > 1);
      if (!series.length) return [];
      const minLength = Math.min(...series.map(points => points.length));
      const trimmed = series.map(points => points.slice(points.length - minLength));
      return trimmed[0].map((point, index) => ({
        d: point.d,
        v: Number((trimmed.reduce((sum, points) => sum + points[index].v, 0) / trimmed.length).toFixed(2)),
      }));
    }

    function avg(items, key) {
      const values = items.map(item => item[key]).filter(Number.isFinite);
      return values.length ? Number((values.reduce((sum, value) => sum + value, 0) / values.length).toFixed(2)) : null;
    }

    function returnFromPoints(points, countBack) {
      if (!points.length) return null;
      const end = points[points.length - 1];
      const start = points[Math.max(0, points.length - countBack - 1)];
      return start && start.v ? Number(((end.v / start.v - 1) * 100).toFixed(2)) : null;
    }

    function previousYearLowFrom(points) {
      if (!points.length) return null;
      const endYear = Number(String(points[points.length - 1].d).slice(0, 4));
      const previous = points.filter(point => Number(String(point.d).slice(0, 4)) === endYear - 1);
      if (!previous.length) return null;
      return previous.reduce((low, point) => point.v < low.v ? point : low, previous[0]);
    }

    function oneYearAgoFrom(points) {
      if (!points.length) return null;
      const end = new Date(points[points.length - 1].d);
      const target = new Date(end);
      target.setFullYear(target.getFullYear() - 1);
      let found = null;
      points.forEach(point => {
        if (new Date(point.d) <= target) found = point;
      });
      return found;
    }

    function buildSectorPayload(stockPayload) {
      const stocks = stockPayload.items || [];
      const groups = {};
      stocks.forEach(item => {
        const key = stockGroupKey(item);
        if (!groups[key]) groups[key] = [];
        groups[key].push(item);
      });
      const items = Object.entries(groups).map(([groupKey, sectorItems]) => {
        const sample = sectorItems[0] || {};
        const sector = sectorOf(sample);
        const region = regionOf(sample);
        const currency = currencyOf(sample);
        const dailyPoints = sectorPointsFor(sectorItems, 'dailyPoints');
        const weeklyPoints = sectorPointsFor(sectorItems, 'weeklyPoints');
        const monthlyPoints = sectorPointsFor(sectorItems, 'monthlyPoints');
        const end = dailyPoints[dailyPoints.length - 1] || monthlyPoints[monthlyPoints.length - 1] || null;
        const start = dailyPoints[0] || monthlyPoints[0] || null;
        const low = previousYearLowFrom(dailyPoints);
        const old = oneYearAgoFrom(dailyPoints);
        return {
          epic: groupKey,
          name: `${region} / ${currency} / ${sector}`,
          symbol: `${sectorItems.length} stocks`,
          groupKey,
          regionName: region,
          currencyName: currency,
          sectorName: sector,
          sectorMemberCount: sectorItems.length,
          instrumentType: 'SECTOR',
          status: 'Aggregated',
          validated: dailyPoints.length > 1 || monthlyPoints.length > 1,
          band: 'Unvalidated',
          performanceRank: null,
          investmentRank: null,
          price: end ? end.v : null,
          priceDate: end ? end.d : null,
          returnTotal: start && end && start.v ? Number(((end.v / start.v - 1) * 100).toFixed(2)) : null,
          return1w: returnFromPoints(dailyPoints, 7),
          return1m: returnFromPoints(dailyPoints, 30),
          return3m: returnFromPoints(dailyPoints, 91),
          return6m: returnFromPoints(dailyPoints, 182),
          return1y: returnFromPoints(dailyPoints, 365),
          oneYearAgoPrice: old ? old.v : null,
          oneYearAgoDate: old ? old.d : null,
          previousYearLowPrice: low ? low.v : null,
          previousYearLowDate: low ? low.d : null,
          distanceFromPreviousYearLowPct: low && end && low.v ? Number(((end.v / low.v - 1) * 100).toFixed(2)) : null,
          days: stockPayload.summary?.sourceAsOf || '',
          monthlyPoints,
          weeklyPoints,
          dailyPoints,
          ma200SlopePct: avg(sectorItems, 'ma200SlopePct'),
          trendScore: avg(sectorItems, 'trendScore'),
          dipScore: avg(sectorItems, 'dipScore'),
          recoveryScore: avg(sectorItems, 'recoveryScore'),
          investmentScore: avg(sectorItems, 'investmentScore'),
          investmentSignal: 'Sector blend',
        };
      });
      classifyClientSide(items);
      return {
        summary: {
          ...(stockPayload.summary || {}),
          instrumentCount: items.length,
          validatedChartCount: items.filter(item => item.validated).length,
          source: `${stockPayload.summary?.source || 'Capital.com demo API'} sectors`,
        },
        items,
      };
    }

    function classifyClientSide(items) {
      const ranked = items.filter(item => item.validated && Number.isFinite(item.returnTotal)).sort((a, b) => b.returnTotal - a.returnTotal);
      const quartile = ranked.length ? Math.ceil(ranked.length * 0.25) : 0;
      const bottomStart = ranked.length - quartile;
      ranked.forEach((item, index) => {
        item.performanceRank = index + 1;
        item.band = index < quartile ? 'Best' : index >= bottomStart ? 'Worst' : 'Mediocre';
      });
      [...items].sort(compareInvestment).forEach((item, index) => { item.investmentRank = index + 1; });
    }

    function pathForSmall(points) {
      if (!points || points.length < 2) return '';
      const width = 96, height = 42, pad = 4;
      const values = points.map(point => point.v);
      let min = Math.min(...values), max = Math.max(...values);
      if (min === max) { min -= 1; max += 1; }
      return points.map((point, index) => {
        const x = pad + (index / (points.length - 1)) * (width - pad * 2);
        const y = pad + (1 - (point.v - min) / (max - min)) * (height - pad * 2);
        return `${index ? 'L' : 'M'}${x.toFixed(1)} ${y.toFixed(1)}`;
      }).join(' ');
    }

    function card(item) {
      const cls = item.displayBand || item.band || 'Unvalidated';
      const points = chartPoints(item);
      const ep = endPoint(points);
      const intraday = isIntradayMode();
      const intraday2h = intradayReturn(item, '2h');
      const intraday4h = intradayReturn(item, '4h');
      const intraday6h = intradayReturn(item, '6h');
      const intradayLow = intradayLowDistance(item, chartMode.value);
      const intradayPanel = intraday
        ? `<div class="periods"><div><span>2H</span><strong>${fmtPct(intraday2h)}</strong></div><div><span>4H</span><strong>${fmtPct(intraday4h)}</strong></div><div><span>6H</span><strong>${fmtPct(intraday6h)}</strong></div><div><span>Low dist</span><strong>${fmtPct(intradayLow)}</strong></div><div><span>Mode</span><strong>${chartMode.value.toUpperCase()}</strong></div></div>`
        : `<div class="periods"><div><span>1W</span><strong>${fmtPct(item.return1w)}</strong></div><div><span>1M</span><strong>${fmtPct(item.return1m)}</strong></div><div><span>3M</span><strong>${fmtPct(item.return3m)}</strong></div><div><span>6M</span><strong>${fmtPct(item.return6m)}</strong></div><div><span>1Y</span><strong>${fmtPct(item.return1y)}</strong></div></div>`;
      const hasInvestmentScore = Number.isFinite(item.investmentScore);
      const hasTrendDetails = [item.trendScore, item.dipScore, item.recoveryScore].some(Number.isFinite);
      const hasLowDistance = Number.isFinite(item.distanceFromPreviousYearLowPct);
      const investmentRank = item.displayInvestmentRank || item.investmentRank || 'n/a';
      const investmentRankLabel = hasInvestmentScore ? 'Inv rank' : 'Low rank';
      const investmentBasis = hasInvestmentScore ? 'weighted score' : hasLowDistance ? 'low-price only' : 'not scored';
      const sectorOpen = activeDataset === 'sectors'
        ? `<button type="button" class="open-sector" data-sector-open="${escapeHtml(item.groupKey || item.sectorName || item.name)}">Open ${escapeHtml(item.name)}</button>`
        : '';
      const sectorLine = activeDataset === 'stocks'
        ? `<div class="code">${escapeHtml(stockGroupLabel(item))}${item.industry ? ` · Industry ${escapeHtml(item.industry)}` : ''}</div>`
        : activeDataset === 'sectors'
          ? `<div class="code">${item.sectorMemberCount || 0} stocks in this region/currency/sector index</div>`
          : '';
      const investmentPanel = hasInvestmentScore
        ? `<div class="invest"><div><span>Invest score</span><strong>${fmtScore(item.investmentScore)}</strong></div><div><span>Signal</span><strong>${escapeHtml(item.investmentSignal || 'Watch')}</strong></div><div><span>MA trend</span><strong>${fmtPct(item.ma200SlopePct)}</strong></div></div>`
        : '';
      const trendPanel = hasTrendDetails
        ? `<div class="code">Trend ${fmtScore(item.trendScore)} / dip ${fmtScore(item.dipScore)} / recovery ${fmtScore(item.recoveryScore)}</div>`
        : `<div class="code">Investment basis: ${investmentBasis}</div>`;
      const qualityDip = qualityDipPanel(item);
      const chart = item.validated && points.length > 1
        ? `<svg viewBox="0 0 218 96" role="img" aria-label="${escapeHtml(item.name)} chart">
             <line class="axis" x1="7" y1="70" x2="211" y2="70"></line>
             <path class="spark" d="${pathFor(points)}"></path>
             ${ep ? `<circle class="end-dot" cx="${ep.x.toFixed(1)}" cy="${ep.y.toFixed(1)}" r="3"></circle>` : ''}
             <text class="chart-label" x="7" y="90">${points[0]?.d || ''}</text>
             <text class="chart-label" x="211" y="90" text-anchor="end">${points[points.length - 1]?.d || ''}</text>
           </svg>`
        : `<div class="no-chart">${intraday ? 'No intraday data loaded' : 'No chart'}</div>`;
      return `<article class="card ${cls}">
        <div class="head"><div><div class="name">${escapeHtml(item.name)}</div><div class="code">${escapeHtml(item.epic || item.symbol || '')}</div></div><span class="badge">${cls}</span></div>
        ${sectorLine}
        <div class="metrics"><div><span>Perf rank</span><strong>${item.displayPerformanceRank || item.performanceRank || 'n/a'}</strong></div><div><span>${investmentRankLabel}</span><strong>${investmentRank}</strong></div><div><span>Price</span><strong>${fmtPrice(item.price)}</strong></div></div>
        ${qualityDip}
        ${investmentPanel}
        ${intradayPanel}
        <div class="refs"><div><span>1Y ago ${item.oneYearAgoDate || ''}</span><strong>${fmtPrice(item.oneYearAgoPrice)}</strong></div><div><span>Prev-year low ${item.previousYearLowDate || ''}</span><strong>${fmtPrice(item.previousYearLowPrice)} · ${fmtDistance(item.distanceFromPreviousYearLowPct)}</strong></div></div>
        ${trendPanel}
        ${chart}
        ${sectorOpen}
        <div class="code">Performance ${item.displayPerformanceRank || item.performanceRank || 'n/a'} · Investment ${investmentRank} (${investmentBasis}) · ${chartMode.value} chart · ${item.priceDate || 'n/a'}</div>
      </article>`;
    }

    function investmentSortValue(item) {
      if (Number.isFinite(item.investmentScore)) return item.investmentScore;

      const distance = Number.isFinite(item.distanceFromPreviousYearLowPct) ? item.distanceFromPreviousYearLowPct : 999;
      const nearLowScore = Math.max(0, 100 - Math.abs(distance) * 3);
      const dipBonus = distance < 0 ? Math.max(0, 20 + distance) : 0;
      const recoveryScore =
        Math.max(0, Math.min(35, (item.return1m || 0) * 2.5)) +
        Math.max(0, Math.min(35, (item.return3m || 0) * 1.5)) +
        Math.max(0, Math.min(30, (item.return6m || 0)));
      const trendFactor =
        0.35 +
        ((item.return1m || 0) > 0 ? 0.12 : 0) +
        ((item.return3m || 0) > 0 ? 0.23 : 0) +
        ((item.return6m || 0) > 0 ? 0.30 : 0);
      if (Number.isFinite(item.distanceFromPreviousYearLowPct)) return (nearLowScore + dipBonus) * trendFactor + recoveryScore * 0.35;

      if (Number.isFinite(item.investmentRank)) return -item.investmentRank;
      return -999999;
    }

    function opportunitySortValue(item) {
      const distance = Number.isFinite(item.distanceFromPreviousYearLowPct) ? item.distanceFromPreviousYearLowPct : 999;
      const lowScore = Math.max(0, 80 - Math.abs(distance) * 2.5);
      const discountScore = Number.isFinite(item.return1y) && item.return1y < 0 ? Math.min(60, Math.abs(item.return1y)) : 0;
      const recoveryScore = Math.max(0, Math.min(30, item.return1m || 0)) + Math.max(0, Math.min(25, item.return3m || 0));
      const trendScore = Math.max(0, Math.min(35, item.ma200SlopePct || 0));
      return lowScore + discountScore + recoveryScore + trendScore;
    }

    function dipUptrendSortValue(item) {
      const distance = Number.isFinite(item.distanceFromPreviousYearLowPct) ? item.distanceFromPreviousYearLowPct : 999;
      const nearLow = Math.max(0, 60 - Math.max(0, distance) * 2);
      const trend = Math.max(0, Math.min(60, (item.ma200SlopePct || 0) * 2));
      const recovery = Math.max(0, Math.min(30, item.return1m || 0));
      return nearLow + trend + recovery;
    }

    function compareInvestment(a, b) {
      const diff = investmentSortValue(b) - investmentSortValue(a);
      return diff || a.name.localeCompare(b.name);
    }

    function compareQualityDip(a, b) {
      const aScore = Number.isFinite(a.qualityDipScore) ? a.qualityDipScore : -Infinity;
      const bScore = Number.isFinite(b.qualityDipScore) ? b.qualityDipScore : -Infinity;
      return bScore - aScore || a.name.localeCompare(b.name);
    }

    function assignQualityDipRanks(items, complete) {
      items.forEach(item => { delete item.displayQualityDipRank; });
      if (!complete) return;
      items
        .filter(item => Number.isFinite(item.qualityDipScore))
        .sort(compareQualityDip)
        .forEach((item, index) => { item.displayQualityDipRank = index + 1; });
    }

    function stockBatchesComplete(summary) {
      return Number.isFinite(summary?.chunkCount)
        && Number.isFinite(summary?.totalChunks)
        && summary.totalChunks > 0
        && summary.chunkCount >= summary.totalChunks;
    }

    function isQualityDipSort(value) {
      return ['qualityDip', 'qualityDiscount', 'qualityStabilizing'].includes(value);
    }

    function syncQualityDipSortControls() {
      const stocksActive = activeDataset === 'stocks';
      [...sort.options]
        .filter(option => option.dataset.stockOnly === 'true')
        .forEach(option => {
          option.hidden = !stocksActive;
          option.disabled = !stocksActive;
        });
      if (!stocksActive && isQualityDipSort(sort.value)) sort.value = 'investmentRank';
    }

    function qualityDipPanel(item) {
      if (activeDataset !== 'stocks') return '';
      const complete = stockBatchesComplete(payload?.summary);
      const rank = !complete
        ? 'Pending'
        : Number.isFinite(item.qualityDipScore) && Number.isFinite(item.displayQualityDipRank)
          ? item.displayQualityDipRank
          : 'Unrated';
      const score = Number.isFinite(item.qualityDipScore) ? fmtScore(item.qualityDipScore) : 'Unrated';
      const component = (value, maximum) => Number.isFinite(value) ? `${fmtScore(value)}/${maximum}` : 'Unrated';
      const signal = Number.isFinite(item.qualityDipScore) ? escapeHtml(item.qualityDipLabel || '') : 'Unrated';
      return `<div class="quality-dip"><div><span>Quality dip</span><strong>${rank}</strong></div><div><span>Score</span><strong>${score}</strong></div><div><span>Signal</span><strong>${signal}</strong></div><div><span>Trend</span><strong>${component(item.qualityDipTrendScore, 40)}</strong></div><div><span>Discount</span><strong>${component(item.qualityDipDiscountScore, 30)}</strong></div><div><span>Stabilizing</span><strong>${component(item.qualityDipStabilizationScore, 20)}</strong></div></div>
        <div class="code quality-dip-context">52W drawdown ${fmtPct(item.qualityDipDrawdownPct)} · vs trend ${fmtPct(item.qualityDipTrendDistancePct)}</div>`;
    }

    function compareBySort(a, b) {
      if (sort.value === 'name') return a.name.localeCompare(b.name);
      if (sort.value === 'investmentRank') return compareInvestment(a, b);
      if (sort.value === 'qualityDip') return compareQualityDip(a, b);
      if (sort.value === 'qualityDiscount') {
        return (a.qualityDipTrendDistancePct ?? 999999)
          - (b.qualityDipTrendDistancePct ?? 999999)
          || compareQualityDip(a, b);
      }
      if (sort.value === 'qualityStabilizing') {
        return (b.qualityDipStabilizationScore ?? -999999)
          - (a.qualityDipStabilizationScore ?? -999999)
          || compareQualityDip(a, b);
      }
      if (sort.value === 'opportunity') return opportunitySortValue(b) - opportunitySortValue(a) || compareInvestment(a, b);
      if (sort.value === 'closestLow') return (a.distanceFromPreviousYearLowPct ?? 999999) - (b.distanceFromPreviousYearLowPct ?? 999999) || compareInvestment(a, b);
      if (sort.value === 'deepestDiscount') return (a.return1y ?? 999999) - (b.return1y ?? 999999) || compareInvestment(a, b);
      if (sort.value === 'dipUptrend') return dipUptrendSortValue(b) - dipUptrendSortValue(a) || compareInvestment(a, b);
      if (sort.value === 'lowestPrice') return (a.price ?? 999999999) - (b.price ?? 999999999) || compareInvestment(a, b);
      if (sort.value === 'best2h') return (intradayReturn(b, '2h') ?? -999999) - (intradayReturn(a, '2h') ?? -999999) || compareInvestment(a, b);
      if (sort.value === 'best4h') return (intradayReturn(b, '4h') ?? -999999) - (intradayReturn(a, '4h') ?? -999999) || compareInvestment(a, b);
      if (sort.value === 'best6h') return (intradayReturn(b, '6h') ?? -999999) - (intradayReturn(a, '6h') ?? -999999) || compareInvestment(a, b);
      if (sort.value === 'nearIntradayLow') return (intradayLowDistance(a) ?? 999999) - (intradayLowDistance(b) ?? 999999) || compareInvestment(a, b);
      if (sort.value === 'intradayRecovery') return (intradayLowDistance(b) ?? -999999) - (intradayLowDistance(a) ?? -999999) || compareInvestment(a, b);
      if (sort.value === 'rebound1m') return (b.return1m ?? -999999) - (a.return1m ?? -999999) || compareInvestment(a, b);
      if (sort.value === 'maTrend') return (b.ma200SlopePct ?? -999999) - (a.ma200SlopePct ?? -999999) || compareInvestment(a, b);
      if (sort.value.startsWith('return')) return (b[sort.value] ?? -999999) - (a[sort.value] ?? -999999);
      return (a.displayPerformanceRank ?? a.performanceRank ?? 999999) - (b.displayPerformanceRank ?? b.performanceRank ?? 999999);
    }

    function prepareDisplayRanks() {
      const items = payload.items || [];
      const performance = [...items]
        .filter(item => item.validated && Number.isFinite(item.returnTotal))
        .sort((a, b) => (b.returnTotal ?? -999999) - (a.returnTotal ?? -999999) || a.name.localeCompare(b.name));
      const quartile = Math.ceil(performance.length * 0.25);
      const bottomStart = performance.length - quartile;
      performance.forEach((item, index) => {
        item.displayPerformanceRank = index + 1;
        item.displayBand = index < quartile ? 'Best' : index >= bottomStart ? 'Worst' : 'Mediocre';
      });
      const investment = [...items].sort(compareInvestment);
      investment.forEach((item, index) => { item.displayInvestmentRank = index + 1; });
      assignQualityDipRanks(items, activeDataset === 'stocks' && stockBatchesComplete(payload.summary));
    }

    function mergePayloads(parts, expectedBatchCount) {
      const itemsByEpic = {};
      parts.forEach(part => (part.items || []).forEach(item => { itemsByEpic[item.epic] = item; }));
      const summaries = parts.map(part => part.summary || {});
      const sourceDates = summaries.map(summary => summary.sourceAsOf).filter(Boolean).sort();
      const refreshed = summaries.map(summary => summary.refreshedAtUtc).filter(Boolean).sort();
      return {
        summary: {
          ...(summaries[summaries.length - 1] || {}),
          sourceAsOf: sourceDates[sourceDates.length - 1] || 'n/a',
          refreshedAtUtc: refreshed[refreshed.length - 1] || '',
          instrumentCount: Object.keys(itemsByEpic).length,
          validatedChartCount: Object.values(itemsByEpic).filter(item => item.validated).length,
          source: 'Capital.com demo API chunks',
          chunkCount: parts.length,
          totalChunks: expectedBatchCount,
        },
        items: Object.values(itemsByEpic),
      };
    }

    async function loadEncryptedFile(file) {
      const response = await fetch(file, { cache: 'no-store' });
      if (!response.ok) throw new Error(`${file} is not ready yet.`);
      return decrypt(await response.json(), dashboardPassword);
    }

    async function stockFilesToLoad() {
      try {
        const manifest = await loadEncryptedFile(stockManifestFile);
        return {
          files: manifest.chunkFiles?.length ? manifest.chunkFiles : stockBatchFiles,
          expectedCount: manifest.instrumentCount || stockBatchCount * stockBatchSize,
        };
      } catch {
        return { files: stockBatchFiles, expectedCount: stockBatchCount * stockBatchSize };
      }
    }

    function updateStocksFromParts(files, expectedCount) {
      const parts = files.map(file => stockPartsByFile[file]).filter(Boolean);
      if (!parts.length) return null;
      datasets.stocks = mergePayloads(parts, files.length);
      datasets.stocks.summary.expectedInstrumentCount = expectedCount;
      if (activeDataset === 'stocks') {
        payload = datasets.stocks;
        prepareDisplayRanks();
        updateSummary();
        render();
      }
      if (activeDataset === 'sectors') delete datasets.sectors;
      return datasets.stocks;
    }

    async function loadAvailableStockBatches(files, expectedCount) {
      for (const file of files) {
        if (stockPartsByFile[file]) continue;
        try {
          stockPartsByFile[file] = await loadEncryptedFile(file);
          const loaded = updateStocksFromParts(files, expectedCount);
          const loadedStocks = loaded?.summary?.instrumentCount || 0;
          note.textContent = `Loaded ${loadedStocks} of about ${expectedCount} stocks from ${Object.keys(stockPartsByFile).length} of ${files.length} batches.`;
        } catch {
          // Missing batches are normal while parallel GitHub jobs are still publishing.
        }
      }
      return updateStocksFromParts(files, expectedCount);
    }

    function scheduleStockBatchPolling(files, expectedCount) {
      if (stockBatchPollTimer || files.every(file => stockPartsByFile[file])) return;
      stockBatchPollTimer = setInterval(async () => {
        await loadAvailableStockBatches(files, expectedCount);
        if (files.every(file => stockPartsByFile[file])) {
          clearInterval(stockBatchPollTimer);
          stockBatchPollTimer = null;
        }
      }, 60000);
    }

    async function loadChunkedStocks() {
      await checkRefreshStatus();
      const { files, expectedCount } = await stockFilesToLoad();
      if (datasets.stocks && files.every(file => stockPartsByFile[file])) return datasets.stocks;
      if (loadingDatasets.stocks) return loadingDatasets.stocks;
      loadingDatasets.stocks = (async () => {
        try {
          const loaded = await loadAvailableStockBatches(files, expectedCount);
          scheduleStockBatchPolling(files, expectedCount);
          if (loaded) return loaded;
          if (refreshIsBusy) {
            throw new Error('Stock refresh is running. Waiting for the first 250-stock batch to publish.');
          }
          const response = await fetch(datasetFiles.stocks, { cache: 'no-store' });
          if (!response.ok) throw new Error('Stock batches are not published yet.');
          const fallback = await decrypt(await response.json(), dashboardPassword);
          datasets.stocks = fallback;
          note.textContent = 'Showing last stock file while new batches publish.';
          return fallback;
        } finally {
          delete loadingDatasets.stocks;
        }
      })();
      return loadingDatasets.stocks;
    }

    async function loadDataset(key) {
      if (datasets[key]) return datasets[key];
      if (key === 'sectors') {
        const stocks = await loadDataset('stocks');
        datasets[key] = buildSectorPayload(stocks);
        return datasets[key];
      }
      if (key === 'stocks') return loadChunkedStocks();
      const response = await fetch(datasetFiles[key], { cache: 'no-store' });
      if (!response.ok) {
        throw new Error(`${datasetLabels[key]} data is not ready yet. Run the GitHub refresh once, or wait for the next daily refresh.`);
      }
      const loaded = await decrypt(await response.json(), dashboardPassword);
      datasets[key] = loaded;
      return loaded;
    }

    function updateSummary() {
      const summary = payload.summary || {};
      document.getElementById('instrument-count').textContent = summary.instrumentCount ?? 0;
      document.getElementById('validated-count').textContent = summary.validatedChartCount ?? 0;
      document.getElementById('source-date').textContent = summary.sourceAsOf || 'n/a';
      document.getElementById('source-name').textContent = String(summary.source || 'Demo').replace('Capital.com demo API chunks', 'Capital API').replace('Capital.com demo API', 'Capital API');
    }

    async function selectDataset(key) {
      activeDataset = key;
      syncQualityDipSortControls();
      tabButtons.forEach(button => button.classList.toggle('active', button.dataset.dataset === key));
      grid.innerHTML = '';
      note.textContent = key === 'sectors' ? 'Loading sector indexes...' : key === 'stocks' ? 'Loading stocks...' : 'Loading ETFs...';
      try {
        payload = await loadDataset(key);
        prepareDisplayRanks();
        updateSummary();
        render();
      } catch (error) {
        note.textContent = error.message || 'Data could not be loaded.';
        grid.innerHTML = '';
      }
    }

    function render() {
      if (!payload) return;
      const token = ++renderToken;
      const query = search.value.trim().toLowerCase();
      let items = (payload.items || []).filter(item => (
        (band.value === 'all' || (item.displayBand || item.band) === band.value) &&
        matchesSearch(item, query)
      ));
      items.sort(compareBySort);
      const summary = payload.summary || {};
      const loadedText = summary.totalChunks && summary.chunkCount < summary.totalChunks
        ? ` Loaded ${summary.instrumentCount || 0} stocks from ${summary.chunkCount} of ${summary.totalChunks} batches.`
        : '';
      const finalNote = `${items.length} shown. Refreshed ${fmtTimestamp(summary.refreshedAtUtc)}; source date ${summary.sourceAsOf || 'n/a'}.${loadedText}`;
      note.textContent = finalNote;
      if (activeDataset === 'sectors') {
        grid.innerHTML = renderSectorGroups(items);
        return;
      }
      if (activeDataset === 'stocks') {
        renderStockGroups(items, token, finalNote);
        return;
      }
      renderCardsInBatches(items, token, finalNote);
    }

    function renderCardsInBatches(items, token, finalNote) {
      const batchSize = 60;
      let index = 0;
      grid.innerHTML = '';
      function appendBatch() {
        if (token !== renderToken) return;
        const next = items.slice(index, index + batchSize);
        grid.insertAdjacentHTML('beforeend', next.map(card).join(''));
        index += batchSize;
        if (index < items.length) {
          note.textContent = `Rendering ${Math.min(index, items.length)} of ${items.length} shown...`;
          requestAnimationFrame(appendBatch);
        } else {
          note.textContent = finalNote;
        }
      }
      appendBatch();
    }

    function renderStockGroups(items, token, finalNote) {
      const groups = {};
      items.forEach(item => {
        const key = stockFamilyKey(item);
        if (!groups[key]) groups[key] = [];
        groups[key].push(item);
      });
      const entries = Object.entries(groups).sort(([left], [right]) => left.localeCompare(right));
      let index = 0;
      grid.innerHTML = '<div class="sector-groups" id="stock-groups"></div>';
      const container = document.getElementById('stock-groups');
      function appendGroup() {
        if (token !== renderToken) return;
        const entry = entries[index];
        if (!entry) {
          note.textContent = finalNote;
          return;
        }
        const [key, groupItems] = entry;
        const collapsed = !expandedGroupKeys.has(key);
        const label = stockFamilyLabel(groupItems[0] || {});
        const best = groupItems.filter(item => (item.displayBand || item.band) === 'Best').length;
        const mediocre = groupItems.filter(item => (item.displayBand || item.band) === 'Mediocre').length;
        const worst = groupItems.filter(item => (item.displayBand || item.band) === 'Worst').length;
        container.insertAdjacentHTML('beforeend', `<section class="sector-group ${collapsed ? 'collapsed' : ''}">
          <button type="button" class="sector-toggle" data-sector-family="${escapeHtml(key)}">${collapsed ? '+' : '-'} ${escapeHtml(label)} <span>${groupItems.length} stocks · Best ${best} · Mid ${mediocre} · Worst ${worst}</span></button>
          <div class="sector-group-grid">${collapsed ? '' : groupItems.map(card).join('')}</div>
        </section>`);
        index += 1;
        if (index < entries.length) {
          note.textContent = `Rendering ${index} of ${entries.length} stock currency groups...`;
          requestAnimationFrame(appendGroup);
        } else {
          note.textContent = finalNote;
        }
      }
      appendGroup();
    }

    function renderSectorGroups(items) {
      const groups = {};
      items.forEach(item => {
        const key = sectorFamilyKey(item);
        if (!groups[key]) groups[key] = [];
        groups[key].push(item);
      });
      return `<div class="sector-groups">${Object.entries(groups)
        .sort(([left], [right]) => left.localeCompare(right))
        .map(([key, groupItems]) => {
          const collapsed = !expandedGroupKeys.has(key);
          const stockCount = groupItems.reduce((sum, item) => sum + (item.sectorMemberCount || 0), 0);
          const label = sectorFamilyLabel(groupItems[0] || {});
          return `<section class="sector-group ${collapsed ? 'collapsed' : ''}">
            <button type="button" class="sector-toggle" data-sector-family="${escapeHtml(key)}">${collapsed ? '+' : '-'} ${escapeHtml(label)} <span>${groupItems.length} sectors · ${stockCount} stocks</span></button>
            <div class="sector-group-grid">${collapsed ? '' : groupItems.map(card).join('')}</div>
          </section>`;
        }).join('')}</div>`;
    }

    async function unlock() {
      if (!password.value) {
        authNote.textContent = 'Enter the dashboard password.';
        return;
      }
      const unlockButton = document.getElementById('unlock');
      unlockButton.disabled = true;
      try {
        dashboardPassword = password.value;
        authNote.textContent = 'Downloading ETF data. First load can take up to a minute.';
        payload = await loadDataset('etfs');
        prepareDisplayRanks();
        updateSummary();
        document.body.classList.remove('locked');
        authNote.textContent = 'Unlocked.';
        authPanel.style.display = 'none';
        checkRefreshStatus();
        render();
      } catch {
        authNote.textContent = 'Password did not unlock the data.';
        unlockButton.disabled = false;
      }
    }

    syncQualityDipSortControls();
    document.getElementById('unlock').addEventListener('click', unlock);
    manualRefresh.addEventListener('click', event => {
      if (manualRefresh.getAttribute('aria-disabled') === 'true') event.preventDefault();
    });
    password.addEventListener('keydown', event => { if (event.key === 'Enter') unlock(); });
    search.addEventListener('input', render);
    band.addEventListener('change', render);
    sort.addEventListener('change', render);
    chartMode.addEventListener('change', render);
    tabButtons.forEach(button => button.addEventListener('click', () => selectDataset(button.dataset.dataset)));
    grid.addEventListener('click', event => {
      const toggle = event.target.closest('.sector-toggle');
      if (toggle) {
        const key = toggle.dataset.sectorFamily;
        if (expandedGroupKeys.has(key)) expandedGroupKeys.delete(key);
        else expandedGroupKeys.add(key);
        render();
        return;
      }
      const button = event.target.closest('.open-sector');
      if (!button) return;
      selectDataset('stocks').then(() => {
        search.value = button.dataset.sectorOpen || '';
        render();
      });
    });
  </script>
</body>
</html>
